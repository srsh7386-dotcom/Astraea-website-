<!DOCTYPE html>
<html>
<head>

<title>Astraea's Nature Journal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

body{
background:#f5ede2;
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
transition:0.3s;
}

.dark{
background:#1e1e1e;
color:white;
}

nav{
background:#3e2f2f;
padding:15px;
position:sticky;
top:0;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

section{
padding:60px 20px;
}

h1{
color:#2E1F1F;
cursor:pointer;
}

.dark h1,.dark h2{
color:#f2f2f2;
}

.hero{
width:80%;
max-width:700px;
border-radius:15px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.grid img{
width:100%;
border-radius:12px;
transition:0.3s;
}

.grid img:hover{
transform:scale(1.05);
}

input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

#messages div{
background:white;
padding:10px;
border-radius:8px;
margin:10px;
}

.dark #messages div{
background:#333;
}

footer{
background:#3e2f2f;
color:white;
padding:20px;
}

a{
color:#8B0000;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#nature">Nature</a>
<a href="#animals">Animals</a>
<a href="#quotes">Quotes</a>
<a href="#guestbook">Guestbook</a>
<a href="#contact">Contact</a>

<button onclick="darkMode()">🌙</button>
</nav>

<section id="home">
<h1 onclick="secretClick()">Welcome to my peaceful journey through nature 🌿</h1>
<p>Exploring nature, animals and peaceful moments.</p>

<img class="hero"
src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
</section>

<section id="nature">
<h2>Nature 🌄</h2>
<div class="grid">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
</div>
</section>

<section id="animals">
<h2>Animals 🐾</h2>
<div class="grid">
<img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131">
<img src="https://images.unsplash.com/photo-1552053831-71594a27632d">
<img src="https://images.unsplash.com/photo-1444464666168-49d633b86797">
</div>
</section>

<section id="quotes">
<h2>Thoughts & Quotes 💭</h2>
<p id="quoteText">
"Mountains teach us patience and silence."
</p>
</section>

<section id="guestbook">

<h2>Leave a Message 💌</h2>

<input id="gname" placeholder="Your name"><br><br>
<input id="gmsg" placeholder="Your message"><br><br>

<button onclick="addMsg()">Send</button>

<div id="messages"></div>

</section>

<section id="contact">
<h2>Contact</h2>
<p>
Instagram:
<a href="https://www.instagram.com/_.astraea._x/" target="_blank">
_.astraea._x
</a>
</p>
</section>

<footer>
<p>© Astraea</p>
</footer>

<script>

function darkMode(){
document.body.classList.toggle("dark");
}

let count=0;
function secretClick(){
count++;
if(count==5){
window.location.href="forest.html";
count=0;
}
}

const quotes = [
"Mountains teach us patience and silence.",
"Travel far enough and you meet yourself.",
"Nature does not hurry yet everything is accomplished.",
"Sometimes the best therapy is a walk in nature."
];

let i = 0;
setInterval(()=>{
i = (i + 1) % quotes.length;
document.getElementById("quoteText").innerText = quotes[i];
},4000);

function addMsg(){

let name=document.getElementById("gname").value;
let msg=document.getElementById("gmsg").value;

if(name=="" || msg=="") return;

let data={name:name,msg:msg};

let all=JSON.parse(localStorage.getItem("msgs"))||[];

all.unshift(data);

localStorage.setItem("msgs",JSON.stringify(all));

showMsgs();

document.getElementById("gname").value="";
document.getElementById("gmsg").value="";
}

function showMsgs(){

let box=document.getElementById("messages");

box.innerHTML="";

let all=JSON.parse(localStorage.getItem("msgs"))||[];

all.forEach(d=>{

let div=document.createElement("div");

div.innerHTML="<b>"+d.name+"</b>: "+d.msg;

box.appendChild(div);

});

}

showMsgs();

</script>

</body>
</html>
